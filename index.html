<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZapFlow Arq</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-theme="light">
  <div class="app">
    <header class="topbar">
      <div>
        <h1>ZapFlow Arq</h1>
        <p class="sub">Sistema comercial simples para arquitetura</p>
      </div>

      <div class="theme-switch">
        <button onclick="setTheme('light')">☀️ Claro</button>
        <button onclick="setTheme('dark')">🌙 Noturno</button>
      </div>
    </header>

    <section class="grid stats-grid">
      <div class="card stat-card">
        <span>Total de Leads</span>
        <strong id="totalLeads">0</strong>
      </div>

      <div class="card stat-card">
        <span>Total de Propostas</span>
        <strong id="totalPropostas">0</strong>
      </div>

      <div class="card stat-card">
        <span>Propostas Enviadas</span>
        <strong id="propostasEnviadas">0</strong>
      </div>

      <div class="card stat-card">
        <span>Status Backend</span>
        <strong id="statusBackend">Aguardando</strong>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Login</h2>
        <button onclick="fazerLogin()">Testar login</button>
      </div>
      <pre id="loginResultado">Aguardando...</pre>
    </section>

    <section class="grid main-grid">
      <section class="card">
        <div class="card-header">
          <h2>Leads</h2>
          <button onclick="listarLeads()">Atualizar leads</button>
        </div>

        <div class="form">
          <input id="leadName" type="text" placeholder="Nome do cliente" />
          <input id="leadProject" type="text" placeholder="Projeto" />
          <input id="leadCity" type="text" placeholder="Cidade" />
          <input id="leadSource" type="text" placeholder="Origem" />
          <input id="leadBudget" type="text" placeholder="Orçamento" />
          <button onclick="criarLead()">Criar lead</button>
        </div>

        <div id="leadsLista" class="list-box">
          <p class="placeholder">Nenhum lead carregado.</p>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>Propostas</h2>
          <button onclick="listarPropostas()">Atualizar propostas</button>
        </div>

        <div class="form">
          <input id="proposalClient" type="text" placeholder="Cliente" />
          <input id="proposalTitle" type="text" placeholder="Título da proposta" />
          <input id="proposalValue" type="text" placeholder="Valor" />
          <button onclick="criarProposta()">Criar proposta</button>
        </div>

        <div id="propostasLista" class="list-box">
          <p class="placeholder">Nenhuma proposta carregada.</p>
        </div>
      </section>
    </section>

    <section class="card">
      <div class="card-header">
        <h2>Resultado técnico</h2>
      </div>
      <pre id="resultadoTecnico">Pronto para uso.</pre>
    </section>
  </div>

  <script>
    const API_URL = "https://backend-facil-production.up.railway.app";

    function setTheme(theme) {
      document.body.setAttribute("data-theme", theme);
      localStorage.setItem("zapflow-theme", theme);
    }

    function loadTheme() {
      const saved = localStorage.getItem("zapflow-theme") || "light";
      document.body.setAttribute("data-theme", saved);
    }

    function setTechnicalResult(data) {
      document.getElementById("resultadoTecnico").textContent = JSON.stringify(data, null, 2);
    }

    async function testarBackend() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        document.getElementById("statusBackend").textContent = data.status || "Online";
        setTechnicalResult(data);
      } catch (error) {
        document.getElementById("statusBackend").textContent = "Erro";
        setTechnicalResult({ ok: false, error: "Não foi possível conectar no backend" });
      }
    }

    async function fazerLogin() {
      try {
        const res = await fetch(API_URL + "/login");
        const data = await res.json();
        document.getElementById("loginResultado").textContent = JSON.stringify(data, null, 2);
        setTechnicalResult(data);
      } catch (error) {
        setTechnicalResult({ ok: false, error: "Erro ao testar login" });
      }
    }

    async function listarLeads() {
      try {
        const res = await fetch(API_URL + "/leads");
        const data = await res.json();
        renderLeads(data.items || []);
        document.getElementById("totalLeads").textContent = (data.items || []).length;
        setTechnicalResult(data);
      } catch (error) {
        setTechnicalResult({ ok: false, error: "Erro ao listar leads" });
      }
    }

    async function criarLead() {
      try {
        const payload = {
          name: document.getElementById("leadName").value || "Novo lead",
          project: document.getElementById("leadProject").value || "Novo projeto",
          city: document.getElementById("leadCity").value || "Não informado",
          source: document.getElementById("leadSource").value || "WhatsApp",
          budget: document.getElementById("leadBudget").value || "R$ 0,00",
          stage: "Novo lead",
          nextAction: "Responder em até 15 min",
          temperature: "Quente"
        };

        const res = await fetch(API_URL + "/leads", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        setTechnicalResult(data);
        await listarLeads();

        document.getElementById("leadName").value = "";
        document.getElementById("leadProject").value = "";
        document.getElementById("leadCity").value = "";
        document.getElementById("leadSource").value = "";
        document.getElementById("leadBudget").value = "";
      } catch (error) {
        setTechnicalResult({ ok: false, error: "Erro ao criar lead" });
      }
    }

    async function listarPropostas() {
      try {
        const res = await fetch(API_URL + "/proposals");
        const data = await res.json();
        renderProposals(data.items || []);
        const items = data.items || [];
        document.getElementById("totalPropostas").textContent = items.length;
        document.getElementById("propostasEnviadas").textContent =
          items.filter(item => item.status === "Enviada").length;
        setTechnicalResult(data);
      } catch (error) {
        setTechnicalResult({ ok: false, error: "Erro ao listar propostas" });
      }
    }

    async function criarProposta() {
      try {
        const payload = {
          client: document.getElementById("proposalClient").value || "Cliente não informado",
          title: document.getElementById("proposalTitle").value || "Nova proposta",
          value: document.getElementById("proposalValue").value || "R$ 0,00",
          status: "Em montagem"
        };

        const res = await fetch(API_URL + "/proposals", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();
        setTechnicalResult(data);
        await listarPropostas();

        document.getElementById("proposalClient").value = "";
        document.getElementById("proposalTitle").value = "";
        document.getElementById("proposalValue").value = "";
      } catch (error) {
        setTechnicalResult({ ok: false, error: "Erro ao criar proposta" });
      }
    }

    function renderLeads(items) {
      const container = document.getElementById("leadsLista");

      if (!items.length) {
        container.innerHTML = '<p class="placeholder">Nenhum lead encontrado.</p>';
        return;
      }

      container.innerHTML = items.map(item => `
        <div class="item-card">
          <div class="item-top">
            <strong>${item.name}</strong>
            <span class="badge">${item.stage}</span>
          </div>
          <div class="item-line">${item.project}</div>
          <div class="item-line">Cidade: ${item.city}</div>
          <div class="item-line">Origem: ${item.source}</div>
          <div class="item-line">Orçamento: ${item.budget}</div>
          <div class="item-line muted">Próxima ação: ${item.nextAction}</div>
        </div>
      `).join("");
    }

    function renderProposals(items) {
      const container = document.getElementById("propostasLista");

      if (!items.length) {
        container.innerHTML = '<p class="placeholder">Nenhuma proposta encontrada.</p>';
        return;
      }

      container.innerHTML = items.map(item => `
        <div class="item-card">
          <div class="item-top">
            <strong>${item.title}</strong>
            <span class="badge">${item.status}</span>
          </div>
          <div class="item-line">Cliente: ${item.client}</div>
          <div class="item-line">Valor: ${item.value}</div>
        </div>
      `).join("");
    }

    loadTheme();
    testarBackend();
    listarLeads();
    listarPropostas();
  </script>
</body>
</html>
